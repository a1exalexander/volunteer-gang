seo:
  title: Volunteer Gang — Дівчата. Збори. Перемога.
  description: Адресні збори для бригад і батальйонів ЗСУ за прямими запитами.
    Активний збір, банда з чотирьох дівчат і шаблони для Instagram — усе в
    одному місці.
hero:
  eyebrow: ВОЛОНТЕРСЬКА КОМАНДА · UA
  sinceLabel: ЗБИРАЄМО, ПОКИ НЕ ПЕРЕМОЖЕМО
  intro: Ми — четверо дівчат, що закривають адресні збори для бригад і батальйонів
    ЗСУ за їхніми прямими запитами. Кожна гривня йде у звіт — з чеками та фото
    передачі.
