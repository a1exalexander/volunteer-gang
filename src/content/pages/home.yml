war:
  lead: росія розпочала цю війну — неспровоковану, загарбницьку. Україна щодня
    під ударами і щодня боронить свою свободу.
  body: У 2014 році росія окупувала Крим і розпалила війну на Донбасі, а 24
    лютого 2022-го пішла у повномасштабний наступ. Відтоді російські ракети й
    дрони атакують українські міста та села щодня — гинуть цивільні,
    руйнуються будинки, лікарні та школи. Це агресія проти незалежної
    держави, і зупинити її можемо лише разом.
  points:
    - title: ЄДНАЙМОСЯ
      text: Разом ми сильніші. Поширюй правду про російську агресію і не давай
        світу звикнути до війни в Україні.
      accent: pink
    - title: ДОПОМАГАЙМО
      text: Армія і люди потребують підтримки щодня. Волонтерство — це руки,
        які наближають перемогу.
      accent: acid
    - title: ДОНАТЬМО
      text: Кожна гривня працює на фронт — дрони, авто, обладнання для бригад
        ЗСУ. Навіть невеликий регулярний внесок має значення.
      accent: bubble
  cta:
    label: Підтримати збір →
    href: "#zbir"
