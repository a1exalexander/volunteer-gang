war:
  lead: Цю війну розпочала росія. Ніхто її не провокував. Україна щодня під
    обстрілами і щодня бореться за свою свободу.
  body: У 2014 році росія окупувала Крим і почала війну на Донбасі. А 24 лютого
    2022-го пішла на нас повномасштабно. З того часу ракети й дрони прилітають
    у наші міста щодня. Гинуть люди, горять будинки, лікарні та школи. Ми не
    маємо права звикати до цього і стояти осторонь. Зупинити це можемо тільки
    разом.
  points:
    - title: ЄДНАЙМОСЯ
      text: Разом ми сильніші. Розповідай правду про війну, підтримуй своїх і
        не дай світу звикнути до того, що в Україні щодня вбивають людей.
      accent: pink
    - title: ДОПОМАГАЙМО
      text: Армії і людям потрібна допомога щодня. Долучайся, як можеш. Руками,
        часом, репостом. Усе це наближає перемогу.
      accent: acid
    - title: ДОНАТЬМО
      text: Кожна гривня стає дронами, авто й обладнанням для бригад ЗСУ.
        Навіть маленький донат має значення, особливо якщо він регулярний.
      accent: bubble
  cta:
    label: Підтримати збір →
    href: "#zbir"
