backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/uploads
public_folder: /uploads

publish_mode: simple
locale: uk

collections:
  # ---------- SITE ----------
  - name: site
    label: 'Налаштування сайту'
    files:
      - name: settings
        label: 'Загальні'
        file: 'src/content/site/settings.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - name: brand
            label: 'Бренд'
            widget: object
            fields:
              - { name: word1, label: 'Слово 1', widget: string }
              - { name: word2, label: 'Слово 2 (графіті)', widget: string }
          - { name: tagline, label: 'Слоган', widget: string }
          - { name: since, label: 'Діємо з (рік)', widget: string }
          - { name: region, label: 'Регіон', widget: string }
          - { name: footerTagline, label: 'Слоган у футері', widget: string }
          - name: cta
            label: 'Кнопка (CTA)'
            widget: object
            fields:
              - { name: label, label: 'Текст', widget: string }
              - { name: href, label: 'Посилання', widget: string }
          - name: nav
            label: 'Меню'
            widget: list
            fields:
              - { name: label, label: 'Текст', widget: string }
              - { name: href, label: 'Посилання', widget: string }
          - name: seo
            label: 'SEO'
            widget: object
            collapsed: true
            fields:
              - { name: title, label: 'Title', widget: string }
              - { name: description, label: 'Description', widget: text }

  # ---------- TEMPLATES DATA ----------
  # Powers the initial state of the Instagram templates generator.
  # (The home «Активний збір» section is driven by the Active Jar collection below.)
  - name: fundraiser
    label: 'Дані для шаблонів'
    files:
      - name: active
        label: 'Дані для шаблонів'
        file: 'src/content/fundraiser/active.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - { name: 'no', label: 'Збір №', widget: string }
          - { name: statusLabel, label: 'Статус (бейдж)', widget: string, default: 'АКТИВНИЙ' }
          - { name: cardTitle, label: 'Заголовок картки (головна)', widget: string }
          - { name: cardBody, label: 'Опис картки (головна)', widget: text }
          - { name: overview, label: 'Текст праворуч (головна)', widget: text }
          - { name: titleMain, label: 'Заголовок для шаблонів', widget: text, hint: 'Кожен рядок — з нового рядка' }
          - { name: titleAccent, label: 'Акцентний рядок (бригада/підрозділ)', widget: string }
          - { name: desc, label: 'Опис для шаблонів', widget: text }
          - { name: goal, label: 'Ціль, ₴', widget: number, value_type: int, min: 1 }
          - { name: raised, label: 'Зібрано, ₴', widget: number, value_type: int, min: 0 }
          - { name: jar, label: 'Лінк на банку', widget: string }

  # ---------- ACTIVE JAR (home «Активний збір» section) ----------
  # Drives the home «Активний збір» section: toggle, target and donate button.
  - name: activeJar
    label: 'Активний збір'
    files:
      - name: active
        label: 'Активний збір'
        file: 'src/content/active-jar/active.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - { name: isActive, label: 'Показувати секцію', widget: boolean, default: true }
          - { name: 'no', label: 'Збір №', widget: string }
          - { name: statusLabel, label: 'Статус (бейдж)', widget: string, default: 'АКТИВНИЙ' }
          - { name: cardTitle, label: 'Заголовок картки', widget: string }
          - { name: cardBody, label: 'Опис картки', widget: text }
          - { name: overview, label: 'Текст праворуч', widget: text }
          - { name: goal, label: 'Ціль, ₴', widget: number, value_type: int, min: 1 }
          - { name: jar, label: 'Лінк на банку', widget: string }
          - { name: jarLabel, label: 'Текст кнопки', widget: string, default: 'Докинути в банку →' }
          - name: noActiveAlert
            label: 'Повідомлення, коли збору немає'
            widget: object
            collapsed: true
            hint: 'Показується замість картки збору, коли секцію вимкнено (наприклад, заклик підтримати UAnimals)'
            fields:
              - { name: lead, label: 'Перше речення (жирним)', widget: string, default: 'Зараз активних зборів немає.' }
              - { name: body, label: 'Текст', widget: text, hint: 'Продовження після жирного речення, до посилання' }
              - { name: linkLabel, label: 'Текст посилання', widget: string, default: 'UAnimals →' }
              - { name: linkHref, label: 'Посилання (повне, з https://)', widget: string, default: 'https://uanimals.org/how-to-help' }

  # ---------- PAGES ----------
  - name: pages
    label: 'Сторінки'
    files:
      - name: home
        label: 'Головна'
        file: 'src/content/pages/home.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - name: seo
            label: 'SEO'
            widget: object
            collapsed: true
            fields:
              - { name: title, label: 'Title', widget: string }
              - { name: description, label: 'Description', widget: text }
          - name: hero
            label: 'Hero'
            widget: object
            fields:
              - { name: eyebrow, label: 'Надзаголовок', widget: string }
              - { name: sinceLabel, label: 'Бейдж «діємо з»', widget: string }
              - { name: intro, label: 'Вступний текст', widget: text }
          - name: sections
            label: 'Заголовки секцій'
            widget: object
            fields:
              - name: war
                label: 'Секція «Війна в Україні»'
                widget: object
                fields:
                  - { name: num, label: 'Номер', widget: string }
                  - { name: title, label: 'Заголовок', widget: string }
              - name: fundraiser
                label: 'Секція «Активний збір»'
                widget: object
                fields:
                  - { name: num, label: 'Номер', widget: string }
                  - { name: title, label: 'Заголовок', widget: string }
              - name: members
                label: 'Секція «Банда»'
                widget: object
                fields:
                  - { name: num, label: 'Номер', widget: string }
                  - { name: title, label: 'Заголовок', widget: string }
              - name: templates
                label: 'Секція «Шаблони»'
                widget: object
                fields:
                  - { name: num, label: 'Номер', widget: string }
                  - { name: title, label: 'Заголовок', widget: string }
          - name: war
            label: 'Війна в Україні'
            widget: object
            fields:
              - { name: lead, label: 'Головна теза', widget: text }
              - { name: body, label: 'Текст', widget: text }
              - name: points
                label: 'Заклики (3)'
                widget: list
                fields:
                  - { name: title, label: 'Заголовок', widget: string }
                  - { name: text, label: 'Текст', widget: text }
              - name: cta
                label: 'Кнопка'
                widget: object
                fields:
                  - { name: label, label: 'Текст', widget: string }
                  - { name: href, label: 'Посилання', widget: string }
          - name: stats
            label: 'Статистика (3)'
            widget: list
            fields:
              - { name: k, label: 'Підпис', widget: string }
              - { name: v, label: 'Значення', widget: string }
              - { name: color, label: 'Колір', widget: select, options: ['pink', 'acid', 'chalk', 'bubble'], default: 'pink' }
          - { name: proofLine, label: 'Рядок «докази»', widget: string }
          - name: members
            label: 'Учасниці'
            widget: list
            fields:
              - { name: idx, label: 'Номер (01…)', widget: string }
              - { name: name, label: 'Імʼя', widget: string }
              - { name: role, label: 'Роль', widget: string }
              - { name: photo, label: 'Фото', widget: image, required: false }
              - { name: instagram, label: 'Instagram (хендл без @)', widget: string, required: false }
              - { name: accent, label: 'Колір рамки', widget: select, options: ['pink', 'acid', 'bubble', 'chalk'], default: 'pink' }
          - name: teaser
            label: 'Тизер шаблонів'
            widget: object
            fields:
              - { name: body, label: 'Текст', widget: text }
              - { name: cta, label: 'Кнопка', widget: string }

  - name: templatesPage
    label: 'Сторінка шаблонів'
    files:
      - name: templates
        label: 'Шаблони Instagram'
        file: 'src/content/pages/templates.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - name: seo
            label: 'SEO'
            widget: object
            fields:
              - { name: title, label: 'Title', widget: string }
              - { name: description, label: 'Description', widget: text }
          - name: studio
            label: 'Тексти редактора шаблонів'
            widget: object
            fields:
              - { name: drawerToggle, label: 'Кнопка відкриття панелі', widget: string }
              - { name: panelAriaLabel, label: 'ARIA назва панелі', widget: string }
              - { name: closePanelAriaLabel, label: 'ARIA кнопки закриття', widget: string }
              - { name: panelTitle, label: 'Заголовок панелі', widget: string }
              - { name: panelIntro, label: 'Опис панелі', widget: text }
              - { name: titleMainLabel, label: 'Лейбл заголовка', widget: string }
              - { name: titleAccentLabel, label: 'Лейбл акцентного рядка', widget: string }
              - { name: descLabel, label: 'Лейбл опису', widget: string }
              - { name: goalLabel, label: 'Лейбл цілі', widget: string }
              - { name: raisedLabel, label: 'Лейбл зібрано', widget: string }
              - { name: photoLabel, label: 'Лейбл фото', widget: string }
              - { name: dropzoneTitleEmpty, label: 'Фото: заголовок (порожньо)', widget: string }
              - { name: dropzoneHintEmpty, label: 'Фото: підказка (порожньо)', widget: string }
              - { name: dropzoneTitleFilled, label: 'Фото: заголовок (завантажено)', widget: string }
              - { name: dropzoneHintFilled, label: 'Фото: підказка (завантажено)', widget: string }
              - { name: clearPhotoLabel, label: 'Кнопка очистки фото', widget: string }
              - { name: colorsTitle, label: 'Заголовок секції кольорів', widget: string }
              - { name: labelsTitle, label: 'Заголовок секції підписів', widget: string }
              - { name: labelsIntro, label: 'Пояснення секції підписів', widget: text }
              - { name: labelsResetLabel, label: 'Кнопка скидання підписів', widget: string }
              - { name: colorsResetLabel, label: 'Кнопка скидання кольорів', widget: string }
              - { name: swatchInkLabel, label: 'Назва кольору: ink', widget: string }
              - { name: swatchChalkLabel, label: 'Назва кольору: chalk', widget: string }
              - { name: swatchPinkLabel, label: 'Назва кольору: pink', widget: string }
              - { name: swatchAcidLabel, label: 'Назва кольору: acid', widget: string }
              - { name: swatchBubbleLabel, label: 'Назва кольору: bubble', widget: string }
              - { name: alertLead, label: 'Попередження: перше речення', widget: string }
              - { name: alertBody, label: 'Попередження: текст', widget: text }
              - name: actions
                label: 'Тексти кнопок і тултіпів'
                widget: object
                fields:
                  - { name: download, label: 'Кнопка завантаження', widget: string }
                  - { name: copy, label: 'Кнопка копіювання', widget: string }
                  - { name: edit, label: 'Кнопка редагувати', widget: string }
                  - { name: done, label: 'Кнопка готово', widget: string }
                  - { name: reset, label: 'Кнопка скинути', widget: string }
                  - { name: resetAll, label: 'Кнопка скинути все', widget: string }
                  - { name: formatGroupAriaLabel, label: 'ARIA групи форматів', widget: string }
                  - { name: formatPostLabel, label: 'Формат пост', widget: string }
                  - { name: formatStoryLabel, label: 'Формат сторіз', widget: string }
                  - { name: saved, label: 'Тултіп успіху збереження', widget: string }
                  - { name: saveError, label: 'Тултіп помилки збереження', widget: string }
                  - { name: copied, label: 'Тултіп успіху копіювання', widget: string }
                  - { name: copyError, label: 'Тултіп помилки копіювання', widget: string }
                  - { name: resizeElementAriaLabel, label: 'ARIA масштабування елемента', widget: string }
                  - { name: removeElementAriaLabel, label: 'ARIA видалення елемента', widget: string }
              - name: labels
                label: 'Базові підписи шаблонів'
                widget: object
                fields:
                  - { name: collect, label: 'collect', widget: string }
                  - { name: active, label: 'active', widget: string }
                  - { name: urgent, label: 'urgent', widget: string }
                  - { name: checks, label: 'checks', widget: string }
                  - { name: handover, label: 'handover', widget: string }
                  - { name: closedKicker, label: 'closedKicker', widget: string }
                  - { name: closed, label: 'closed', widget: string }
                  - { name: collected, label: 'collected', widget: string }
                  - { name: thermo, label: 'thermo', widget: string }
                  - { name: equator, label: 'equator', widget: string }
                  - { name: deadline, label: 'deadline', widget: string }
                  - { name: lastDay, label: 'lastDay', widget: string }
                  - { name: checksWeekly, label: 'checksWeekly', widget: string }
                  - { name: giftKicker, label: 'giftKicker', widget: string }
                  - { name: giftHeadline, label: 'giftHeadline', widget: string }
                  - { name: giftPreview, label: 'giftPreview', widget: string }
                  - { name: giftList, label: 'giftList', widget: string }
                  - { name: giftItem1, label: 'giftItem1', widget: string }
                  - { name: giftItem2, label: 'giftItem2', widget: string }
                  - { name: giftItem3, label: 'giftItem3', widget: string }
                  - { name: giftItem4, label: 'giftItem4', widget: string }
                  - { name: giftFor, label: 'giftFor', widget: string }
                  - { name: giftBrigade, label: 'giftBrigade', widget: string }

  - name: ui
    label: 'Спільні тексти інтерфейсу'
    files:
      - name: shared
        label: 'Header / Footer / Consent'
        file: 'src/content/ui/shared.yml'
        extension: 'yml'
        format: 'yml'
        fields:
          - { name: templatesHeaderTag, label: 'Шапка: тег на сторінці шаблонів', widget: string }
          - { name: backHomeLabel, label: 'Шапка: посилання на головну', widget: string }
          - { name: templatesResetAllLabel, label: 'Шапка: кнопка скинути все', widget: string }
          - { name: templatesResetAllAriaLabel, label: 'Шапка: ARIA кнопки скинути все', widget: string }
          - { name: footerBrandBookLabel, label: 'Футер: бренд-бук', widget: string }
          - name: consent
            label: 'Банер аналітики'
            widget: object
            fields:
              - { name: kicker, label: 'Kicker', widget: string }
              - { name: body, label: 'Текст', widget: text }
              - { name: acceptLabel, label: 'Кнопка прийняти', widget: string }
              - { name: declineLabel, label: 'Кнопка відхилити', widget: string }
